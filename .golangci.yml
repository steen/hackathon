version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - gosec
    - revive
    - misspell
    - unparam
    - prealloc
    - bodyclose
    - noctx
    - nilerr
    - errorlint
    - exhaustive

  settings:
    revive:
      rules:
        - name: var-naming
        - name: unused-parameter
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "disableStutteringCheck"
        - name: indent-error-flow
        - name: errorf
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: unreachable-code

    gosec:
      excludes:
        # G104 (audit errors not checked) overlaps with errcheck which is already on.
        - G104

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - errcheck
          - noctx
      # bodyclose: scoped to the WS dialer test paths. websocket.Dial returns
      # an *http.Response whose Body is the underlying TCP connection that
      # *websocket.Conn already owns; closing it independently would race the
      # WS close handshake. Production code closes it explicitly. Other test
      # code is still subject to bodyclose.
      - path: tests/(cli-send-watch|server-ws-hub)/.*_test\.go
        linters:
          - bodyclose
      - path: apps/server/internal/(wsapi|http)/.*_test\.go
        linters:
          - bodyclose
      - path: _test\.go
        text: "unused-parameter"
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - hackathon

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
