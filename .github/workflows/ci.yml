name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache: true
      - name: Verify go.work
        run: go env GOWORK && test -f go.work
      - name: Build (each module)
        run: |
          set -e
          while read -r mod; do
            [ -z "$mod" ] && continue
            echo "::group::go build $mod"
            (cd "$mod" && go build ./...)
            echo "::endgroup::"
          done < <(awk '/^use \(/,/^\)/' go.work | sed -n 's|^\s*\./||p')
      - name: Test (each module)
        run: |
          set -e
          while read -r mod; do
            [ -z "$mod" ] && continue
            echo "::group::go test $mod"
            (cd "$mod" && go test ./...)
            echo "::endgroup::"
          done < <(awk '/^use \(/,/^\)/' go.work | sed -n 's|^\s*\./||p')

  pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm -r --if-present test
      - name: Build
        run: pnpm -r --if-present build
