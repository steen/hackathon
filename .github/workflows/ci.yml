name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        timeout-minutes: 10
        # Explicit -timeout=8m makes the per-package cap visible in the
        # workflow rather than relying on `go test`'s 10m default. Step
        # timeout-minutes is a belt-and-braces outer bound. See #651.
        run: go test -timeout=8m ./...
      - name: Smoke test
        timeout-minutes: 5
        run: bash scripts/smoke.sh

  pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Build
        timeout-minutes: 5
        run: pnpm -r --if-present build
      - name: Test
        timeout-minutes: 5
        # RUN_PROD_BUNDLE_HYGIENE=1 enables the slow apps/web prod-bundle
        # regression guard (apps/web/src/__tests__/prod-bundle-hygiene.test.ts)
        # which builds the web app and asserts no `__chatd` test hook leaks
        # into dist/assets/*.js. Skipped by default in dev runs. See #699.
        env:
          RUN_PROD_BUNDLE_HYGIENE: "1"
        run: pnpm -r --if-present test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        timeout-minutes: 8
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned to v2.12.x — the v2 line is the schema this .golangci.yml
          # targets (`version: "2"`). Bump deliberately and re-run locally
          # before changing.
          version: v2.12.1
          args: --timeout=5m

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile

      # Invariant: in-repo TS packages must lint-resolve from source.
      # CI runs install -> lint without any build step, so any
      # packages/*/package.json that points main/types/exports at ./dist/
      # would let consumers' lint pass falsely (or fail with unsafe-any
      # after the fact, as in PR #84). This check fails the lint job
      # before ESLint runs, naming the offending package.
      - name: Check workspace exports resolve from source
        timeout-minutes: 2
        run: pnpm run check:workspace-exports

      # `pnpm run lint` is `eslint . --max-warnings 0`. Any error- or
      # warning-level violation fails the job.
      - name: ESLint
        timeout-minutes: 5
        run: pnpm run lint

      - name: Prettier check
        timeout-minutes: 5
        run: pnpm run format:check

  e2e:
    runs-on: ubuntu-latest
    # The Playwright image bundles Ubuntu 22.04 (jammy) + the system libs
    # Playwright needs (libnss3, libatk-bridge, libgbm, the GTK/X stack,
    # fonts, etc.) + chromium/firefox/webkit pinned to this exact Playwright
    # release. The tag (v1.59.1) tracks the resolved @playwright/test version
    # in pnpm-lock.yaml; bumping @playwright/test requires bumping this tag
    # in the same PR, otherwise the bundled browsers won't match the test
    # runner's protocol. See #824 — this avoids the ~180-package apt-install
    # over Azure mirrors that consistently timed out at 8min on the runner.
    container: mcr.microsoft.com/playwright:v1.59.1-jammy
    if: ${{ github.event.pull_request.draft != true }}
    steps:
      - uses: actions/checkout@v4

      # Inside the Playwright container, the runner's workspace
      # (/__w/<repo>/<repo>) is checked out by the host user but mounted into
      # the container as a different uid; git rejects it as "dubious
      # ownership" and `go build` then fails with `error obtaining VCS
      # status: exit status 128`. Marking the directory safe is the
      # documented escape hatch.
      - name: Mark workspace as safe for git (container)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile

      # Browsers and system deps are baked into the container image, so this
      # is a fast-path no-op that just verifies the install. No --with-deps
      # because the libs are already present. Keeping the step makes the
      # contract explicit and surfaces image/devDep skew loudly: a mismatch
      # forces Playwright to re-download, and the 2min timeout catches it.
      - name: Verify Playwright browsers
        timeout-minutes: 2
        run: pnpm --filter web exec playwright install chromium webkit

      - name: e2e (CLI + web)
        timeout-minutes: 8
        run: pnpm e2e
