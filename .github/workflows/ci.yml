name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Smoke test
        run: bash scripts/smoke.sh

  pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r --if-present build
      - name: Test
        run: pnpm -r --if-present test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned to v2.12.x — the v2 line is the schema this .golangci.yml
          # targets (`version: "2"`). Bump deliberately and re-run locally
          # before changing.
          version: v2.12.1
          args: --timeout=5m

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Invariant: in-repo TS packages must lint-resolve from source.
      # CI runs install -> lint without any build step, so any
      # packages/*/package.json that points main/types/exports at ./dist/
      # would let consumers' lint pass falsely (or fail with unsafe-any
      # after the fact, as in PR #84). This check fails the lint job
      # before ESLint runs, naming the offending package.
      - name: Check workspace exports resolve from source
        run: pnpm run check:workspace-exports

      # `pnpm run lint` is `eslint . --max-warnings 0`. Any error- or
      # warning-level violation fails the job.
      - name: ESLint
        run: pnpm run lint

      - name: Prettier check
        run: pnpm run format:check
