name: feature-implementation-loop
description: |
  Use when: You have a feature plan markdown file and want to drive the full implementation cycle (test plan → TDD → E2E → review → PR) in one run.
  Triggers: User invokes with a path to a feature plan (e.g. specs/plans/phase-1/feature-auth.md), or phrases like "run feature-implementation-loop", "implement feature from plan", "execute feature loop", "start feature implementation".
  Does: Parses the feature plan and parent PRD; expands a full test plan; creates a feat/{slug} branch; runs a strict red-green-refactor TDD loop for unit tests (gated by the full unit suite); implements E2E tests (gated by the full suite); reviews the implementation against acceptance criteria, requirement IDs, and coding standards; fixes critical/high findings; commits, pushes, and opens a PR via gh CLI with requirement-ID traceability.
  NOT for: Quick hotfixes, bug fixes without a feature plan, partially-implemented features already in progress, or non-test-driven changes.

nodes:
  - id: parse-feature-plan
    command: feature-parse-plan
    output_format:
      type: json
    allowed_tools: [Read, Bash, Glob, Grep]
    denied_tools: [Edit, Write]

  - id: setup-branch
    depends_on: [parse-feature-plan]
    bash: |
      #!/bin/bash
      set -euo pipefail

      # archon auto-shell-quotes $nodeId.output; reference it bare
      JSON=$parse-feature-plan.output
      # Strip markdown code fences if the model wrapped JSON in ```json ... ```
      # Extract first valid JSON object (defends against code-fenced or prose-wrapped output)
      JSON=$(printf '%s' "$JSON" | jq -Rrs 'capture("(?<j>\\{[\\s\\S]*\\})") | .j' 2>/dev/null || printf '%s' "$JSON")
      SLUG=$(echo "$JSON" | jq -r '.slug')

      if [ -z "$SLUG" ] || [ "$SLUG" = "null" ]; then
        echo "ERROR: slug from parse-feature-plan is empty" >&2
        exit 1
      fi
      BRANCH="feat/$SLUG"

      # Ignore .archon/** in dirty check: archon injects the latest workflow/command
      # files into the worktree filesystem regardless of the branch's HEAD, so they
      # always appear modified relative to a stale base branch.
      DIRTY=$(git status --porcelain -- ':(exclude).archon')
      if [ -n "$DIRTY" ]; then
        echo "ERROR: working tree has non-.archon dirty files — commit or stash" >&2
        echo "$DIRTY" >&2
        exit 1
      fi

      # Capture the parent branch (whatever archon checked out: main, or another
      # feat/* branch when --from was used). create-pr will use this as the PR's
      # base so stacked features get the correct base branch (BASE_BRANCH archon
      # variable always points at the repo default, so it can't carry --from).
      PARENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
      mkdir -p "$ARTIFACTS_DIR"
      printf '%s' "$PARENT_BRANCH" > "$ARTIFACTS_DIR/parent-branch"
      echo "parent branch captured: $PARENT_BRANCH"

      if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
        echo "branch $BRANCH already exists — checking out"
        git checkout "$BRANCH"
      else
        echo "creating branch $BRANCH from $PARENT_BRANCH"
        git checkout -b "$BRANCH"
      fi

      git rev-parse --abbrev-ref HEAD

  - id: create-test-plan
    command: feature-create-test-plan
    depends_on: [setup-branch]
    allowed_tools: [Read, Write, Bash]
    denied_tools: [Edit]

  - id: tdd-unit-loop
    depends_on: [create-test-plan]
    loop:
      prompt: |
        You are running a STRICT red-green-refactor TDD loop for unit tests.

        Feature plan data (JSON, raw — do not re-emit wrapped in code fences):

        $parse-feature-plan.output

        The test plan path is the `test_plan_path` field of the JSON above.

        Coding standards (the project's CLAUDE.md is automatically loaded by Claude Code; do not re-read it):
        - Immutability: never mutate existing objects; return new copies.
        - Files < 800 lines; extract when growing.
        - Validation at boundaries (user input, API responses, file content).
        - Parameterized SQL only — never string-interpolate values.
        - Repository pattern for data access.
        - API responses use the envelope `{ ok, data, error }`.
        - Test names carry their requirement ID.

        Each iteration:
        1. Read the test plan to find the next unit test that is NOT YET implemented.
        2. RED: Write the failing test first. Run only that test and confirm it fails for the
           RIGHT reason (missing code, not syntax error). If it passes immediately, the test
           is wrong — rewrite it.
        3. GREEN: Write the minimal code to make the test pass. No extras, no speculative
           helpers, no unrelated refactors.
        4. REFACTOR: Clean up only what you just wrote — extract small functions, name things
           well, drop dead code. Never mutate inputs.
        5. Run the full unit-test suite to confirm nothing regressed.
        6. Move to the next test. If every unit test in the plan is now green, stop.

        Do NOT touch E2E tests in this loop — those come next.
        Do NOT make tests pass by weakening their assertions.
        Do NOT skip the RED step — every test must fail first.

        When every unit test in the plan is implemented and green, emit the literal token
        `<promise>UNIT_TDD_COMPLETE</promise>` as the last line of your output. Otherwise,
        do not emit it — the loop will continue.
      until: UNIT_TDD_COMPLETE
      until_bash: |
        #!/bin/bash
        set -e
        FAIL=0
        FOUND=0
        # Go: any module reachable via go.work (covers apps/*, packages/*, tests/*, and the root)
        if [ -f go.work ]; then
          FOUND=1
          go test ./... -short || FAIL=1
        else
          for f in $(find . -maxdepth 4 -name go.mod -not -path '*/node_modules/*' 2>/dev/null); do
            d=$(dirname "$f")
            FOUND=1
            (cd "$d" && go test ./... -short) || FAIL=1
          done
        fi
        # TS workspaces; --if-present skips workspaces that don't define the script
        if command -v pnpm >/dev/null 2>&1; then
          if [ -f pnpm-workspace.yaml ] || [ -f pnpm-lock.yaml ]; then
            FOUND=1
            pnpm -r --if-present test:unit || FAIL=1
          fi
        fi
        if [ "$FOUND" -eq 0 ]; then
          echo "until_bash: no test runners detected — refusing to mark loop done" >&2
          exit 1
        fi
        exit $FAIL
      max_iterations: 30
      fresh_context: true
    allowed_tools: [Read, Write, Edit, Bash, Glob, Grep]

  - id: e2e-implementation
    depends_on: [tdd-unit-loop]
    loop:
      prompt: |
        You are implementing E2E tests from the test plan and making them pass — without
        breaking any unit tests.

        Feature plan data (JSON, raw — do not re-emit wrapped in code fences):

        $parse-feature-plan.output

        The test plan path is the `test_plan_path` field of the JSON above.

        Each iteration:
        1. Read the test plan and pick the next E2E test that is NOT YET implemented or NOT
           YET passing.
        2. Write or extend the E2E test against the target file from the plan. Use the test
           name format from the plan (with the requirement ID).
        3. Implement whatever wiring the test requires — endpoints, fixtures, seed data — keeping
           changes minimal and within the files declared in `files_to_touch` plus E2E-specific
           paths.
        4. Run unit tests to confirm no regression.
        5. Run the full suite (`go test ./... && pnpm -r test`) to confirm forward progress.
        6. Repeat until every E2E test in the plan passes.

        Standards still apply: envelope `{ ok, data, error }`, immutability, parameterized SQL,
        validation at boundaries, repository pattern, files <800 lines.

        When every E2E test in the plan is implemented and the full suite (unit + E2E) is
        green, emit the literal token `<promise>E2E_IMPLEMENTATION_COMPLETE</promise>` as
        the last line of your output. Otherwise, do not emit it — the loop will continue.
      until: E2E_IMPLEMENTATION_COMPLETE
      until_bash: |
        #!/bin/bash
        set -e
        if [ -f go.work ] || ls -1 */go.mod >/dev/null 2>&1; then
          go test ./...
        fi
        if command -v pnpm >/dev/null 2>&1 && [ -f pnpm-workspace.yaml ]; then
          pnpm -r --if-present test
        fi
      max_iterations: 20
      fresh_context: true
    allowed_tools: [Read, Write, Edit, Bash, Glob, Grep]

  - id: review-implementation
    command: feature-review
    depends_on: [e2e-implementation]
    output_format:
      type: json
    allowed_tools: [Read, Glob, Grep, Bash]
    denied_tools: [Edit, Write]

  - id: address-findings
    depends_on: [review-implementation]
    when: "$review-implementation.output.verdict == 'needs_fixes'"
    loop:
      prompt: |
        You are fixing review findings from `review-implementation`.

        Findings (JSON, raw — do not re-emit wrapped in code fences):

        $review-implementation.output

        Feature plan data (JSON, raw — do not re-emit wrapped in code fences):

        $parse-feature-plan.output

        Each iteration:
        1. Address every `critical` finding first, then every `high`. Tackle `medium`
           findings if the fix is small and obviously correct; defer the rest.
        2. For each fix:
           - Re-read the file at the cited line.
           - Make the smallest change that resolves the finding without breaking other tests.
           - If the fix requires a new test (e.g. missing requirement-ID tag), update the
             test file too.
        3. Run the full suite (`go test ./... && pnpm -r test`) after each batch.
        4. After all critical/high issues are addressed, write a marker file
           `$ARTIFACTS_DIR/second-pass-ok` containing the current git short SHA.
           This marker tells the loop the second pass succeeded. (It lives in the
           workflow artifacts dir so it stays out of the git working tree.)

        Do NOT introduce new features. Do NOT refactor unrelated code. Do NOT weaken tests
        to make them pass — fix the implementation.

        When all CRITICAL and HIGH findings are resolved, the full test suite is green, and
        the marker file `$ARTIFACTS_DIR/second-pass-ok` exists, emit the literal
        token `<promise>FINDINGS_ADDRESSED</promise>` as the last line of your output.
        Otherwise, do not emit it — the loop will continue.
      until: FINDINGS_ADDRESSED
      until_bash: |
        #!/bin/bash
        set -e
        if [ -f go.work ] || ls -1 */go.mod >/dev/null 2>&1; then
          go test ./...
        fi
        if command -v pnpm >/dev/null 2>&1 && [ -f pnpm-workspace.yaml ]; then
          pnpm -r --if-present test
        fi
        test -f "$ARTIFACTS_DIR/second-pass-ok"
      max_iterations: 5
      fresh_context: true
    allowed_tools: [Read, Write, Edit, Bash, Glob, Grep]

  - id: create-pr
    depends_on: [review-implementation, address-findings]
    trigger_rule: all_done
    bash: |
      #!/bin/bash
      set -euo pipefail

      # archon auto-shell-quotes $nodeId.output; reference bare
      JSON=$parse-feature-plan.output
      REVIEW=$review-implementation.output
      # Strip markdown code fences if the model wrapped JSON in ```json ... ```
      # Extract first valid JSON object (defends against code-fenced or prose-wrapped output)
      JSON=$(printf '%s' "$JSON" | jq -Rrs 'capture("(?<j>\\{[\\s\\S]*\\})") | .j' 2>/dev/null || printf '%s' "$JSON")
      REVIEW=$(printf '%s' "$REVIEW" | jq -Rrs 'capture("(?<j>\\{[\\s\\S]*\\})") | .j' 2>/dev/null || printf '%s' "$REVIEW")

      SLUG=$(echo "$JSON" | jq -r '.slug')
      FEATURE_NAME=$(echo "$JSON" | jq -r '.feature_name')
      FEATURE_PLAN=$(echo "$JSON" | jq -r '.feature_plan_path')
      PHASE_PLAN=$(echo "$JSON" | jq -r '.parent_phase.path')
      PRD_PATH=$(echo "$JSON" | jq -r '.prd_path')
      VERDICT=$(echo "$REVIEW" | jq -r '.verdict')

      if [ -z "$SLUG" ] || [ "$SLUG" = "null" ] || [ -z "$FEATURE_NAME" ] || [ "$FEATURE_NAME" = "null" ]; then
        echo "ERROR: missing slug or feature_name from parse-feature-plan" >&2
        exit 1
      fi

      BRANCH="feat/$SLUG"

      # Resolve parent branch (captured by setup-branch). Falls back to
      # origin's default if the marker is missing.
      if [ -f "$ARTIFACTS_DIR/parent-branch" ]; then
        PARENT_BRANCH=$(cat "$ARTIFACTS_DIR/parent-branch")
      else
        PARENT_BRANCH=$(git remote show origin | sed -n 's/.*HEAD branch: //p')
        PARENT_BRANCH=${PARENT_BRANCH:-main}
      fi
      echo "PR will target base: $PARENT_BRANCH"

      # Commit any outstanding implementation work. The TDD/E2E loops edit files
      # but don't commit; without this the branch would be empty and gh pr create
      # would fail with "No commits between main and feat/<slug>".
      git add -A
      if git diff --cached --quiet; then
        echo "no staged changes to commit"
      else
        git commit -m "feat($SLUG): $FEATURE_NAME"
      fi

      # Bring the branch up to date with the parent. Try rebase first (clean
      # linear history); if conflicts, abort the rebase and fall back to merge.
      # If both fail, leave the branch as-is and force draft so a human can
      # resolve.
      git fetch origin "$PARENT_BRANCH" --quiet || true
      REBASE_RC=0
      MERGE_RC=0
      if ! git rebase "origin/$PARENT_BRANCH" >"$ARTIFACTS_DIR/rebase.log" 2>&1; then
        REBASE_RC=$?
        git rebase --abort 2>/dev/null || true
        if ! git merge --no-edit "origin/$PARENT_BRANCH" >"$ARTIFACTS_DIR/merge.log" 2>&1; then
          MERGE_RC=$?
          git merge --abort 2>/dev/null || true
          echo "WARN: could not rebase or merge origin/$PARENT_BRANCH; opening PR as-is" >&2
        fi
      fi
      SYNC_FAILED=0
      if [ "$REBASE_RC" -ne 0 ] && [ "$MERGE_RC" -ne 0 ]; then
        SYNC_FAILED=1
      fi

      # Authoritative test gate. The loops' `until` tokens are LLM-emitted and
      # can short-circuit the `until_bash` exit condition; this re-runs the full
      # suite before opening the PR. Failures don't abort — they force draft mode
      # and surface the failing output in the PR body so a human can triage.
      mkdir -p "$ARTIFACTS_DIR"
      VERIFY_LOG="$ARTIFACTS_DIR/verify.log"
      VERIFY_RC=0
      {
        if [ -f go.work ] || ls -1 */go.mod >/dev/null 2>&1; then
          go test ./... 2>&1
        fi
        if command -v pnpm >/dev/null 2>&1 && [ -f pnpm-workspace.yaml ]; then
          pnpm -r --if-present test 2>&1
        fi
      } >"$VERIFY_LOG" 2>&1 || VERIFY_RC=$?
      echo "verify-tests exit code: $VERIFY_RC"

      # Refuse to push an empty branch.
      AHEAD=$(git rev-list --count "origin/$PARENT_BRANCH..HEAD" 2>/dev/null || echo 0)
      if [ "$AHEAD" -eq 0 ]; then
        echo "ERROR: branch $BRANCH has no commits ahead of origin/$PARENT_BRANCH — nothing to PR" >&2
        exit 1
      fi

      # Force-with-lease in case rebase rewrote local history above.
      git push -u --force-with-lease origin "$BRANCH"

      BODY_FILE="$(mktemp)"
      trap 'rm -f "$BODY_FILE"' EXIT

      {
        echo "## Summary"
        echo
        echo "Implements **$FEATURE_NAME** per the feature plan."
        echo
        echo "## Plan links"
        echo "- Feature plan: \`$FEATURE_PLAN\`"
        echo "- Phase plan: \`$PHASE_PLAN\`"
        echo "- PRD: \`$PRD_PATH\`"
        echo
        echo "## Requirement IDs covered"
        echo "$JSON" | jq -r '.requirement_ids[]' | while read -r ID; do
          echo "- [x] $ID"
        done
        echo
        echo "## Tests"
        echo
        echo "Test names tagged with their requirement IDs (see \`specs/plans/phase-*/$SLUG/test-plan.md\`):"
        echo
        echo "$JSON" | jq -r '.requirement_ids[]' | while read -r ID; do
          ID_UNDERSCORE="${ID//-/_}"
          echo "### $ID"
          grep -rEn "func Test[A-Za-z0-9_]*${ID_UNDERSCORE}|it\\(['\"]${ID}" \
            --include='*.go' --include='*.ts' --include='*.tsx' --include='*.js' \
            -- . 2>/dev/null | sed 's/^/- /' || echo "- (none found — investigate)"
          echo
        done
        echo "## Risks / Out of Scope"
        RISKS=$(echo "$JSON" | jq -r '.risks[]?' 2>/dev/null)
        if [ -n "$RISKS" ]; then
          echo "$RISKS" | sed 's/^/- /'
        else
          echo "None identified."
        fi
        echo
        echo "## Review verdict"
        echo "- $VERDICT"
        if [ "$SYNC_FAILED" -ne 0 ]; then
          echo
          echo "## ⚠ Could not sync with parent branch (PR forced to draft)"
          echo
          echo "Both \`git rebase origin/$PARENT_BRANCH\` and \`git merge origin/$PARENT_BRANCH\` failed."
          echo "Resolve manually before merging."
        fi
        if [ "$VERIFY_RC" -ne 0 ]; then
          echo
          echo "## ⚠ Local test gate FAILED (PR forced to draft)"
          echo
          echo "The workflow re-ran the full suite after the inner loops marked"
          echo "themselves complete and got a non-zero exit. The LLM may have"
          echo "claimed completion prematurely. Triage before merging."
          echo
          echo "<details><summary>Last 80 lines of verify output</summary>"
          echo
          echo '```'
          tail -n 80 "$VERIFY_LOG"
          echo '```'
          echo
          echo "</details>"
        fi
      } > "$BODY_FILE"

      # Use repo PR template if present (prepend it)
      if [ -f .github/pull_request_template.md ]; then
        TMP="$(mktemp)"
        cat .github/pull_request_template.md > "$TMP"
        echo >> "$TMP"
        echo "---" >> "$TMP"
        echo >> "$TMP"
        cat "$BODY_FILE" >> "$TMP"
        mv "$TMP" "$BODY_FILE"
      fi

      DRAFT_FLAG=""
      if [ "$VERDICT" = "needs_fixes" ] || [ "$VERIFY_RC" -ne 0 ] || [ "$SYNC_FAILED" -ne 0 ]; then
        DRAFT_FLAG="--draft"
      fi

      gh pr create \
        --base "$PARENT_BRANCH" \
        --head "$BRANCH" \
        --title "feat($SLUG): $FEATURE_NAME" \
        --body-file "$BODY_FILE" \
        $DRAFT_FLAG

  - id: summarize
    depends_on: [create-pr]
    bash: |
      #!/bin/bash
      set -e

      # archon auto-shell-quotes $nodeId.output; reference bare and strip fences defensively
      JSON=$parse-feature-plan.output
      # Extract first valid JSON object (defends against code-fenced or prose-wrapped output)
      JSON=$(printf '%s' "$JSON" | jq -Rrs 'capture("(?<j>\\{[\\s\\S]*\\})") | .j' 2>/dev/null || printf '%s' "$JSON")
      SLUG=$(echo "$JSON" | jq -r '.slug')
      FEATURE_NAME=$(echo "$JSON" | jq -r '.feature_name')

      mkdir -p "$ARTIFACTS_DIR"

      PR_URL=$(gh pr view "feat/$SLUG" --json url -q .url 2>/dev/null || echo "")

      UNIT_COUNT=$(grep -rE 'func Test[A-Za-z0-9_]+' --include='*_test.go' . 2>/dev/null | wc -l | tr -d ' ' || echo 0)
      TS_UNIT_COUNT=$(grep -rE "it\\(['\"]" --include='*.test.ts' --include='*.test.tsx' --include='*.spec.ts' . 2>/dev/null | wc -l | tr -d ' ' || echo 0)
      E2E_COUNT=$(find tests/e2e -type f \( -name '*.spec.ts' -o -name '*.spec.js' \) 2>/dev/null | wc -l | tr -d ' ' || echo 0)
      # Use origin/main since the worktree may not have a local main ref
      FILES_CHANGED=$(git diff --name-only "origin/main...HEAD" 2>/dev/null | wc -l | tr -d ' ' || echo 0)

      SUMMARY_FILE="$ARTIFACTS_DIR/summary.md"
      {
        echo "# feature-implementation-loop summary"
        echo
        echo "- **Feature:** $FEATURE_NAME ($SLUG)"
        echo "- **PR URL:** $PR_URL"
        echo "- **Branch:** feat/$SLUG"
        echo "- **Files changed:** $FILES_CHANGED"
        echo "- **Go unit tests:** $UNIT_COUNT"
        echo "- **TS unit tests:** $TS_UNIT_COUNT"
        echo "- **E2E test files:** $E2E_COUNT"
        echo
        echo "## Requirement IDs covered"
        echo "$JSON" | jq -r '.requirement_ids[]' | sed 's/^/- /'
      } > "$SUMMARY_FILE"

      cat "$SUMMARY_FILE"
      echo
      echo "wrote: $SUMMARY_FILE"
