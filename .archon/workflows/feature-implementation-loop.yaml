name: feature-implementation-loop
description: |
  Use when: You have a feature plan markdown file and want to drive the full implementation cycle (test plan → TDD → E2E → review → PR) in one run.
  Triggers: User invokes with a path to a feature plan (e.g. specs/plans/phase-1/feature-auth.md), or phrases like "run feature-implementation-loop", "implement feature from plan", "execute feature loop", "start feature implementation".
  Does: Parses the feature plan and parent PRD; expands a full test plan; creates a feat/{slug} branch; runs a strict red-green-refactor TDD loop for unit tests; implements E2E tests; runs the full test suite; reviews the implementation against acceptance criteria, requirement IDs, and coding standards; fixes critical/high findings; pushes the branch and opens a PR via gh CLI with requirement-ID traceability.
  NOT for: Quick hotfixes, bug fixes without a feature plan, partially-implemented features already in progress, or non-test-driven changes.

nodes:
  - id: parse-feature-plan
    prompt: |
      You are extracting structured intent from a feature plan markdown file.

      The user invoked this workflow with the following input (must contain a feature plan path):

      ```

      ```

      STEPS:
      1. Determine the feature plan path. If the user input contains an explicit path ending in `.md`,
         use that. Otherwise fail with a clear error: the workflow requires a feature plan path.
      2. If the file does not exist, fail with a clear error message and stop.
      3. Read the feature plan file with the Read tool.
      4. Read CLAUDE.md and any `~/.claude/rules/common/*.md` files so downstream nodes inherit
         coding-standard context (immutability, files <800 lines, validation at boundaries,
         parameterized SQL, repository pattern, requirements-not-implementation coverage).
      5. Extract:
         - `feature_name` (string, from the `# Feature:` heading or first H1)
         - `slug` (lowercase, hyphenated, derived from the file name `feature-{slug}.md`)
         - `parent_phase` (object with `number`, `slug`, and `path` to the phase plan markdown,
           parsed from the "Parent phase" link in the feature plan)
         - `requirement_ids` (array of strings — every `US-\d+` or `FR-[\w.\-]+` ID listed under
           "Requirements covered")
         - `acceptance_criteria` (array of strings, verbatim from the plan, each must be testable)
         - `implementation_steps` (ordered array of strings)
         - `test_plan_skeleton` (verbatim contents of the "Test plan" section, may be empty)
         - `files_to_touch` (array of relative paths from "Files expected to be touched or created")
         - `risks` (array of strings; empty array if "None identified")
      6. Locate the parent PRD. Default to `specs/PRD.md`. If the feature plan or phase plan
         references a different PRD path, use that. If the file does not exist, fail.
      7. Read the PRD and, for each `requirement_id`, capture its description text. Emit them as
         `requirements`: `[{"id": "US-1", "description": "..."}]`.
      8. Capture the PRD revision: run `git log -n 1 --pretty=format:%h -- <prd-path>` via Bash.
         Use the literal string "uncommitted" if git fails or the file is untracked.

      Output ONLY a single JSON object as your final response, with this exact shape:

      {
        "feature_plan_path": "specs/plans/phase-1/feature-auth.md",
        "feature_name": "Auth",
        "slug": "auth",
        "parent_phase": {
          "number": 1,
          "slug": "foundation",
          "path": "specs/plans/phase-1-foundation.md"
        },
        "prd_path": "specs/PRD.md",
        "prd_revision": "abc1234",
        "requirement_ids": ["US-1", "FR-1.1"],
        "requirements": [
          {"id": "US-1", "description": "..."},
          {"id": "FR-1.1", "description": "..."}
        ],
        "acceptance_criteria": ["..."],
        "implementation_steps": ["..."],
        "test_plan_skeleton": "...",
        "files_to_touch": ["..."],
        "risks": ["..."]
      }
    output_format:
      type: json
    allowed_tools: [Read, Bash, Glob, Grep]
    denied_tools: [Edit, Write]

  - id: create-test-plan
    depends_on: [parse-feature-plan]
    prompt: |
      Expand the feature plan's test skeleton into a full test plan.

      Parsed feature plan data (JSON):
      ```json

      ```

      Steps:
      1. Run `mkdir -p specs/plans/phase-{parent_phase.number}/{slug}` via Bash.
      2. Use the Write tool to create `specs/plans/phase-{parent_phase.number}/{slug}/test-plan.md`
         (idempotent — overwrite if it already exists).
      3. For EVERY requirement ID, list both unit tests and E2E tests. A requirement with no
         tests is a bug — flag it.
      4. Test names MUST carry the requirement ID:
         - Go: `TestUS1_RegisterCreatesUserAndReturnsToken`, `TestFR_1_1_PasswordHashedWithBcrypt`
         - TS/JS: `it('US-1: register creates user and returns token', ...)`,
           `it('FR-payload-opaque: server never logs payload', ...)`
      5. Test names must describe behaviour from the requirement, not implementation details.
         Tests organised by requirement, not by file/module.

      Test plan file structure:

      ```markdown
      # Test plan: {feature_name}

      **Feature plan:** [feature-{slug}.md](../feature-{slug}.md)
      **Parent phase:** [Phase {N}: {phase title}](../../phase-{N}-{phase-slug}.md)
      **PRD revision:** {prd_revision}

      ## Coverage matrix

      | Requirement ID | Description | Unit tests | E2E tests |
      |----------------|-------------|------------|-----------|
      | US-1 | ... | 2 | 1 |

      ## Unit tests

      ### US-1 — {description}

      - **Name:** `TestUS1_RegisterCreatesUserAndReturnsToken`
        - **Target file:** `apps/api/auth/register_test.go`
        - **Asserts:**
          - returns 200 with `{ ok: true, data: { token } }` envelope
          - persists user with bcrypt-hashed password
          - rejects duplicate email with `{ ok: false, error }`

      ### FR-1.1 — {description}
      ...

      ## E2E tests

      ### US-1 — {description}

      - **Name:** `it('US-1: user registers, logs in, and accesses protected route', ...)`
        - **Target file:** `tests/e2e/auth.spec.ts`
        - **Scenario:** POST /register → POST /login → GET /me with bearer token
        - **Asserts:** all responses use `{ ok, data, error }` envelope; token is JWT-shaped

      ## Coverage rules
      - Every requirement ID has at least one unit test AND at least one E2E test.
      - Test names start with the requirement ID for grep-ability.
      - Tests describe behaviour, not implementation — no asserting on private helpers.
      ```

      When done, print `wrote: <path>`.
    allowed_tools: [Read, Write, Bash]
    denied_tools: [Edit]

  - id: setup-branch
    depends_on: [parse-feature-plan]
    bash: |
      #!/bin/bash
      set -euo pipefail

      SLUG=""
      if [ -z "$SLUG" ]; then
        echo "ERROR: slug from parse-feature-plan is empty" >&2
        exit 1
      fi
      BRANCH="feat/$SLUG"

      if [ -n "$(git status --porcelain)" ]; then
        echo "ERROR: working tree is dirty — commit or stash before running this workflow" >&2
        git status --short >&2
        exit 1
      fi

      if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
        echo "branch $BRANCH already exists — checking out"
        git checkout "$BRANCH"
      else
        echo "creating branch $BRANCH from $(git rev-parse --abbrev-ref HEAD)"
        git checkout -b "$BRANCH"
      fi

      git rev-parse --abbrev-ref HEAD

  - id: tdd-unit-loop
    depends_on: [create-test-plan, setup-branch]
    loop:
      prompt: |
        You are running a STRICT red-green-refactor TDD loop for unit tests.

        Feature plan data (JSON):
        ```json

        ```

        Test plan path: `specs/plans/phase-/{slug}/test-plan.md`

        Coding standards (read once if not already loaded):
        - CLAUDE.md and ~/.claude/rules/common/*.md
        - Immutability: never mutate existing objects; return new copies.
        - Files < 800 lines; extract when growing.
        - Validation at boundaries (user input, API responses, file content).
        - Parameterized SQL only — never string-interpolate values.
        - Repository pattern for data access.
        - API responses use the envelope `{ ok, data, error }`.
        - Test names carry their requirement ID.

        Each iteration:
        1. Read the test plan to find the next unit test that is NOT YET implemented.
        2. RED: Write the failing test first. Run only that test and confirm it fails for the
           RIGHT reason (missing code, not syntax error). If it passes immediately, the test
           is wrong — rewrite it.
        3. GREEN: Write the minimal code to make the test pass. No extras, no speculative
           helpers, no unrelated refactors.
        4. REFACTOR: Clean up only what you just wrote — extract small functions, name things
           well, drop dead code. Never mutate inputs.
        5. Run the full unit-test suite to confirm nothing regressed.
        6. Move to the next test. If every unit test in the plan is now green, stop.

        Do NOT touch E2E tests in this loop — those come next.
        Do NOT make tests pass by weakening their assertions.
        Do NOT skip the RED step — every test must fail first.

        When every unit test in the plan is implemented and green, emit the literal token
        `<promise>UNIT_TDD_COMPLETE</promise>` as the last line of your output. Otherwise,
        do not emit it — the loop will continue.
      until: UNIT_TDD_COMPLETE
      until_bash: |
        #!/bin/bash
        set -e
        FAIL=0
        # Go modules under apps/* and packages/*
        for d in apps/* packages/*; do
          if [ -f "$d/go.mod" ]; then
            (cd "$d" && go test ./... -short) || FAIL=1
          fi
        done
        # TS workspaces (skip silently if pnpm not present)
        if command -v pnpm >/dev/null 2>&1; then
          pnpm -r test:unit || FAIL=1
        fi
        exit $FAIL
      max_iterations: 30
      fresh_context: true
    allowed_tools: [Read, Write, Edit, Bash, Glob, Grep]

  - id: e2e-implementation
    depends_on: [tdd-unit-loop]
    loop:
      prompt: |
        You are implementing E2E tests from the test plan and making them pass — without
        breaking any unit tests.

        Feature plan data (JSON):
        ```json

        ```

        Test plan path: `specs/plans/phase-/{slug}/test-plan.md`

        Each iteration:
        1. Read the test plan and pick the next E2E test that is NOT YET implemented or NOT
           YET passing.
        2. Write or extend the E2E test against the target file from the plan. Use the test
           name format from the plan (with the requirement ID).
        3. Implement whatever wiring the test requires — endpoints, fixtures, seed data — keeping
           changes minimal and within the files declared in `files_to_touch` plus E2E-specific
           paths.
        4. Run unit tests to confirm no regression.
        5. Run the full suite (`go test ./... && pnpm -r test`) to confirm forward progress.
        6. Repeat until every E2E test in the plan passes.

        Standards still apply: envelope `{ ok, data, error }`, immutability, parameterized SQL,
        validation at boundaries, repository pattern, files <800 lines.

        When every E2E test in the plan is implemented and the full suite (unit + E2E) is
        green, emit the literal token `<promise>E2E_IMPLEMENTATION_COMPLETE</promise>` as
        the last line of your output. Otherwise, do not emit it — the loop will continue.
      until: E2E_IMPLEMENTATION_COMPLETE
      until_bash: |
        #!/bin/bash
        set -e
        go test ./...
        if command -v pnpm >/dev/null 2>&1; then
          pnpm -r test
        fi
      max_iterations: 20
      fresh_context: true
    allowed_tools: [Read, Write, Edit, Bash, Glob, Grep]

  - id: run-full-suite
    depends_on: [e2e-implementation]
    bash: |
      #!/bin/bash
      set -e
      echo "=== Running full Go test suite ==="
      go test ./...
      if command -v pnpm >/dev/null 2>&1; then
        echo "=== Running full TS test suite ==="
        pnpm -r test
      else
        echo "pnpm not found — skipping TS suite"
      fi
      echo "OK: full suite green"
    timeout: 1800000

  - id: review-implementation
    depends_on: [run-full-suite]
    prompt: |
      You are reviewing the implementation and tests against the feature plan, the parent PRD,
      and the project's coding standards.

      Feature plan data (JSON):
      ```json

      ```

      Test plan path: `specs/plans/phase-/{slug}/test-plan.md`

      Review dimensions (each finding belongs to exactly ONE):

      (a) **Acceptance criteria coverage** — every item in `acceptance_criteria` is exercised
          by at least one passing test. Missing coverage is `critical`.

      (b) **Requirement ID coverage** — every ID in `requirement_ids` appears in at least one
          test name (unit or E2E). Use grep to verify. Missing tags are `high`.

      (c) **Coding standards** (from CLAUDE.md and ~/.claude/rules/common/*.md):
          - Immutability — code creates new objects, never mutates inputs. Violations: `high`.
          - File size — no implementation file exceeds 800 lines. Violations: `medium`.
          - Validation at boundaries — user input / API responses / file content validated
            before use. Violations: `high`.
          - Parameterized SQL only — never string-interpolate values into queries. Violations:
            `critical`.
          - Repository pattern — data access behind an interface, not inline ORM calls scattered
            in handlers. Violations: `medium`.
          - API envelope `{ ok, data, error }` on new endpoints. Violations: `medium`.

      (d) **Test quality**:
          - Tests describe behaviour, not implementation details. Violations: `medium`.
          - No tests asserting on private helpers when a public path covers the same behaviour.
            Violations: `medium`.
          - Tests organised by requirement ID, not by file/module shape. Violations: `low`.
          - No mutation-based tests that pass against bugs (e.g. asserting current buggy
            output). Violations: `high`.

      Process:
      1. Use Read/Glob/Grep extensively. Do NOT modify files in this node.
      2. For each finding, include: `severity`, `dimension` (a-d), `file` (relative path),
         `line` (number or null), `requirement_id` (or null), `summary`, `recommendation`.
      3. Determine the verdict:
         - `pass` — zero `critical` and zero `high` findings.
         - `needs_fixes` — any `critical` or `high` finding.

      Output ONLY a single JSON object:

      {
        "verdict": "pass",
        "critical": [],
        "high": [],
        "medium": [],
        "low": [],
        "summary": "..."
      }
    output_format:
      type: json
    allowed_tools: [Read, Glob, Grep, Bash]
    denied_tools: [Edit, Write]

  - id: address-findings
    depends_on: [review-implementation]
    when: "$review-implementation.output.verdict == 'needs_fixes'"
    loop:
      prompt: |
        You are fixing review findings from `review-implementation`.

        Findings (JSON):
        ```json

        ```

        Feature plan data:
        ```json

        ```

        Each iteration:
        1. Address every `critical` finding first, then every `high`. Tackle `medium`
           findings if the fix is small and obviously correct; defer the rest.
        2. For each fix:
           - Re-read the file at the cited line.
           - Make the smallest change that resolves the finding without breaking other tests.
           - If the fix requires a new test (e.g. missing requirement-ID tag), update the
             test file too.
        3. Run the full suite (`go test ./... && pnpm -r test`) after each batch.
        4. After all critical/high issues are addressed, write a marker file
           `.archon/.feature-loop-second-pass-OK` containing the current git short SHA.
           This marker tells the loop the second pass succeeded.

        Do NOT introduce new features. Do NOT refactor unrelated code. Do NOT weaken tests
        to make them pass — fix the implementation.

        When all CRITICAL and HIGH findings are resolved, the full test suite is green, and
        the marker file `.archon/.feature-loop-second-pass-OK` exists, emit the literal
        token `<promise>FINDINGS_ADDRESSED</promise>` as the last line of your output.
        Otherwise, do not emit it — the loop will continue.
      until: FINDINGS_ADDRESSED
      until_bash: |
        #!/bin/bash
        set -e
        go test ./...
        if command -v pnpm >/dev/null 2>&1; then
          pnpm -r test
        fi
        test -f .archon/.feature-loop-second-pass-OK
      max_iterations: 5
      fresh_context: true
    allowed_tools: [Read, Write, Edit, Bash, Glob, Grep]

  - id: create-pr
    depends_on: [review-implementation, address-findings]
    trigger_rule: all_done
    bash: |
      #!/bin/bash
      set -euo pipefail

      SLUG=""
      FEATURE_NAME=""
      FEATURE_PLAN=""
      PHASE_PLAN=""
      PRD_PATH=""
      VERDICT=""

      if [ -z "$SLUG" ] || [ -z "$FEATURE_NAME" ]; then
        echo "ERROR: missing slug or feature_name from parse-feature-plan" >&2
        exit 1
      fi

      BRANCH="feat/$SLUG"
      git push -u origin "$BRANCH"

      # Build PR body in a temp file
      BODY_FILE="$(mktemp)"
      trap 'rm -f "$BODY_FILE"' EXIT

      {
        echo "## Summary"
        echo
        echo "Implements **$FEATURE_NAME** per the feature plan."
        echo
        echo "## Plan links"
        echo "- Feature plan: \`$FEATURE_PLAN\`"
        echo "- Phase plan: \`$PHASE_PLAN\`"
        echo "- PRD: \`$PRD_PATH\`"
        echo
        echo "## Requirement IDs covered"
        for ID in ; do
          echo "- [x] $ID"
        done
        echo
        echo "## Tests"
        echo
        echo "Test names tagged with their requirement IDs (see \`specs/plans/phase-*/$SLUG/test-plan.md\`):"
        echo
        # List Go test functions and TS it() blocks that mention any requirement ID
        for ID in ; do
          echo "### $ID"
          grep -rEn "func Test[A-Za-z0-9_]*${ID//-/_}|it\\(['\"]${ID}" \
            --include='*.go' --include='*.ts' --include='*.tsx' --include='*.js' \
            -- . 2>/dev/null | sed 's/^/- /' || echo "- (none found — investigate)"
          echo
        done
        echo "## Risks / Out of Scope"
        if [ -n "" ]; then
          echo
        else
          echo "None identified."
        fi
        echo
        echo "## Review verdict"
        echo "- $VERDICT"
      } > "$BODY_FILE"

      # Use repo PR template if present (append our body after it)
      if [ -f .github/pull_request_template.md ]; then
        TMP="$(mktemp)"
        cat .github/pull_request_template.md > "$TMP"
        echo >> "$TMP"
        echo "---" >> "$TMP"
        echo >> "$TMP"
        cat "$BODY_FILE" >> "$TMP"
        mv "$TMP" "$BODY_FILE"
      fi

      DRAFT_FLAG=""
      if [ "$VERDICT" = "needs_fixes" ]; then
        DRAFT_FLAG="--draft"
      fi

      gh pr create \
        --base main \
        --head "$BRANCH" \
        --title "feat($SLUG): $FEATURE_NAME" \
        --body-file "$BODY_FILE" \
        $DRAFT_FLAG

      gh pr view "$BRANCH" --json url -q .url

  - id: summarize
    depends_on: [create-pr]
    bash: |
      #!/bin/bash
      set -e

      SLUG=""
      FEATURE_NAME=""
      ARTIFACTS_DIR="/Users/emilchristensen/.archon/workspaces/steen/Hackathon/artifacts/runs/91074e6e9875918f647111b7260c45ab"
      mkdir -p "$ARTIFACTS_DIR"

      PR_URL=""

      # Count tests by requirement ID
      UNIT_COUNT=$(grep -rE 'func Test[A-Za-z0-9_]+' --include='*_test.go' . 2>/dev/null | wc -l | tr -d ' ' || echo 0)
      TS_UNIT_COUNT=$(grep -rE "it\\(['\"]" --include='*.test.ts' --include='*.test.tsx' --include='*.spec.ts' . 2>/dev/null | wc -l | tr -d ' ' || echo 0)
      E2E_COUNT=$(find tests/e2e -type f \( -name '*.spec.ts' -o -name '*.spec.js' \) 2>/dev/null | wc -l | tr -d ' ' || echo 0)

      FILES_CHANGED=$(git diff --name-only "main...HEAD" 2>/dev/null | wc -l | tr -d ' ' || echo 0)

      SUMMARY_FILE="$ARTIFACTS_DIR/summary.md"
      {
        echo "# feature-implementation-loop summary"
        echo
        echo "- **Feature:** $FEATURE_NAME ($SLUG)"
        echo "- **PR URL:** $PR_URL"
        echo "- **Branch:** feat/$SLUG"
        echo "- **Files changed:** $FILES_CHANGED"
        echo "- **Go unit tests:** $UNIT_COUNT"
        echo "- **TS unit tests:** $TS_UNIT_COUNT"
        echo "- **E2E test files:** $E2E_COUNT"
        echo
        echo "## Requirement IDs covered"
        for ID in ; do
          echo "- $ID"
        done
      } > "$SUMMARY_FILE"

      cat "$SUMMARY_FILE"
      echo
      echo "wrote: $SUMMARY_FILE"
