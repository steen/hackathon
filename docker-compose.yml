# Single-service compose for hackathon/homelab deploys.
#
# `build: .` (not `image:`): every `docker compose up --build` rebuilds from
# the local source tree. Trade-off: no registry to set up, but a code change
# adds 30-60s to startup. Acceptable for hackathon scope; see
# docs/ops/runbook.md for the rationale and the upgrade flow.
#
# The `healthcheck:` block invokes the binary's own `--health-probe`
# flag (#796). The production image is `gcr.io/distroless/static-debian12:nonroot`
# — no shell, no `wget`, no `curl` — so the probe lives in the binary
# itself. `test:` uses the exec form (no CMD-SHELL) since distroless
# has no /bin/sh. Verify with:
#
#   docker inspect $(docker compose ps -q chat-server) \
#     --format '{{.State.Health.Status}}'

services:
  chat-server:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - chat-data:/data
    environment:
      CHAT_DB_PATH: /data/chat.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/chat-server", "--health-probe"]
      interval: 30s
      timeout: 3s
      start_period: 10s

volumes:
  chat-data:
